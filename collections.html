<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collections</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Montserrat',sans-serif;
    background:#fff;
}

/* HEADER */
header{
    position:relative;
    padding:18px;
    text-align:center;
    font-weight:700;
    font-size:1.4rem;
    text-transform:lowercase;
}

/* BACK BUTTON */
.back{
    position:absolute;
    left:18px;
    top:18px;
    text-decoration:none;
    font-size:1rem;
    color:#000;
}

/* GRID - FIXED MOBILE ALIGNMENT */
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:16px;
    padding:16px;
    justify-items:center;
}

/* PRODUCT CARD */
.card{
    width:92vw;
    max-width:360px;
    background:#f4f4f4;
    border-radius:16px;
    padding:14px;
    text-align:center;
}

/* IMAGE FIX */
.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:12px;
    display:block;
}

/* TEXT */
.card h2{
    margin-top:10px;
    font-size:1.05rem;
}

.card p{
    font-size:0.85rem;
    color:#666;
    margin-top:4px;
}

.price{
    margin-top:8px;
    font-weight:700;
}

/* TABLET + DESKTOP */
@media(min-width:768px){
    .grid{
        grid-template-columns:repeat(2,1fr);
        padding:30px;
    }

    .card{
        width:100%;
    }
}
</style>
</head>

<body>

<header>
    <a href="index.html" class="back">← back</a>
    collections
</header>

<div class="grid">

    <div class="card">
        <img src="assets/products/product1.jpg">
        <h2>Ferrari Jersey</h2>
        <p>2026 edition motorsport jersey</p>
        <div class="price">₹1,499</div>
    </div>

    <div class="card">
        <img src="assets/products/product2.jpg">
        <h2>Red Bull Jersey</h2>
        <p>Street racing inspired edition</p>
        <div class="price">₹1,299</div>
    </div>

</div>

</body>
</html>
