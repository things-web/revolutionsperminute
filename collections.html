<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferrari Collections</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Montserrat',sans-serif;
    background:#fff;
    overflow-x:hidden;
}

/* HEADER */
header{
    position:relative;
    padding:16px;
    text-align:center;
    font-weight:700;
    font-size:1.4rem;
    text-transform:lowercase;
}

/* BACK BUTTON */
.back{
    position:absolute;
    left:16px;
    top:16px;
    text-decoration:none;
    font-size:1rem;
    color:#000;
}

/* LIST */
.grid{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:28px;
    padding:20px 0;
}

/* PRODUCT CARD */
.product{
    width:92vw;
    max-width:340px;
    text-align:center;
    text-decoration:none;
    color:inherit;
}

/* IMAGE */
.product img{
    width:100%;
    height:220px;
    object-fit:contain;
    background:#fff;
    display:block;
}

/* TITLE */
.product h2{
    margin-top:10px;
    font-size:1rem;
    font-weight:700;
}

/* DESCRIPTION */
.product p{
    font-size:0.85rem;
    color:#666;
    margin-top:4px;
}

/* PRICE */
.price{
    margin-top:6px;
    font-weight:700;
    color:#000;
}

/* RESPONSIVE */
@media(min-width:768px){
    .product{
        max-width:360px;
    }

    .product img{
        height:240px;
    }
}

</style>
</head>

<body>

<header>
    <a href="index.html" class="back">← back</a>
    ferrari collection
</header>

<div class="grid">

    <!-- PRODUCT 1 -->
    <a href="ferrari-2025-polo.html" class="product">
        <img src="assets/products/ferrari_polo_2025.jpg">
        <h2>Ferrari 2025 Drivers Polo Jersey</h2>
        <p>Official-inspired performance polo</p>
        <div class="price">₹1,499</div>
    </a>

    <!-- PRODUCT 2 -->
    <a href="ferrari-monza-edition.html" class="product">
        <img src="assets/products/ferrari_monza.jpg">
        <h2>Ferrari Monza Edition</h2>
        <p>Track-special heritage edition</p>
        <div class="price">₹1,599</div>
    </a>

    <!-- PRODUCT 3 -->
    <a href="ferrari-swartwell-oversized.html" class="product">
        <img src="assets/products/ferrari_oversized.jpg">
        <h2>Ferrari Swartwell Oversized Drivers T-shirt</h2>
        <p>Streetwear motorsport fusion fit</p>
        <div class="price">₹1,299</div>
    </a>

</div>

</body>
</html>
