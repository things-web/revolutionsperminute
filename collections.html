<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collections</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#fff;
    font-family:'Montserrat',sans-serif;
}

/* HEADER */
header{
    text-align:center;
    padding:18px;
    font-weight:700;
    font-size:1.25rem;
    text-transform:lowercase;
    position:relative;
}

.back{
    position:absolute;
    left:16px;
    top:18px;
    text-decoration:none;
    color:#000;
    font-size:18px;
}

/* CART */
.cart-wrap{
    position:absolute;
    right:16px;
    top:18px;
    text-decoration:none;
    color:#000;
    font-size:22px;
}

.cart-count{
    position:absolute;
    top:-6px;
    right:-10px;
    background:#000;
    color:#fff;
    font-size:10px;
    min-width:18px;
    height:18px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 4px;
    font-weight:700;
}

.cart-count.hide{
    display:none;
}

/* GRID */
.grid{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:34px;
    padding:18px 0 40px;
}

.item{
    width:92vw;
    max-width:340px;
    position:relative;
}

.item img{
    width:100%;
    height:240px;
    object-fit:contain;
    display:block;
    background:#fff;
}

/* COMING SOON */
.soon img{
    filter:blur(1.2px) brightness(0.92);
}

.badge{
    position:absolute;
    bottom:12px;
    left:50%;
    transform:translateX(-50%);
    font-family:'Bebas Neue',sans-serif;
    font-size:1.6rem;
    letter-spacing:2px;
    color:#111;
    text-transform:uppercase;
    opacity:0.9;
}
</style>
</head>

<body>

<header>
    <a class="back" href="index.html">←</a>

    collections

    <a href="cart.html" class="cart-wrap">
        🛒
        <span class="cart-count hide" id="cartCount">0</span>
    </a>
</header>

<div class="grid">

    <!-- READY PRODUCT -->
    <div class="item">
        <a href="product.html?id=polo">
            <img src="assets/products/ferrari_polo_2025.jpg">
        </a>
    </div>

    <!-- COMING SOON 1 -->
    <div class="item soon">
        <img src="assets/products/ferrari-puma-monza-2025-special-edition-t-shirt.jpg">
        <div class="badge">Coming Soon</div>
    </div>

    <!-- COMING SOON 2 -->
    <div class="item soon">
        <img src="assets/products/ferrari_oversized.jpg">
        <div class="badge">Coming Soon</div>
    </div>

</div>

<script>
function updateCartCount(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

cart.forEach(item=>{
    total += item.qty;
});

const badge = document.getElementById("cartCount");

badge.innerText = total;

if(total === 0){
    badge.classList.add("hide");
}else{
    badge.classList.remove("hide");
}

}

updateCartCount();
</script>

</body>
</html>
