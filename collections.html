<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collections</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#fff;
    font-family:Arial, sans-serif;
}

/* HEADER */
header{
    text-align:center;
    padding:16px;
    font-weight:700;
    font-size:1.3rem;
    text-transform:lowercase;
    position:relative;
    border-bottom:1px solid #eee;
}

/* BACK */
.back{
    position:absolute;
    left:16px;
    top:16px;
    text-decoration:none;
    color:#000;
    font-size:16px;
}

/* PREMIUM CART */
.cart-wrap{
    position:absolute;
    right:16px;
    top:16px;
    text-decoration:none;
    color:#000;
    font-size:22px;
}

.cart-count{
    position:absolute;
    top:-7px;
    right:-10px;
    background:#000;
    color:#fff;
    font-size:10px;
    min-width:18px;
    height:18px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 4px;
    font-weight:700;
}

.cart-count.hide{
    display:none;
}

/* GRID */
.grid{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:25px;
    padding:22px 0;
}

.item{
    width:92vw;
    max-width:340px;
}

.item img{
    width:100%;
    height:240px;
    object-fit:contain;
    background:#fff;
    display:block;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <a class="back" href="index.html">←</a>

    collections

    <a href="cart.html" class="cart-wrap">
        🛒
        <span class="cart-count hide" id="cartCount">0</span>
    </a>
</header>

<div class="grid">

    <!-- PRODUCT 1 -->
    <div class="item">
        <a href="product.html?id=polo">
            <img src="assets/products/ferrari_polo_2025.jpg">
        </a>
    </div>

    <!-- PRODUCT 2 -->
    <div class="item">
        <a href="product.html?id=monza">
            <img src="assets/products/ferrari-puma-monza-2025-special-edition-t-shirt.jpg">
        </a>
    </div>

    <!-- PRODUCT 3 -->
    <div class="item">
        <a href="product.html?id=swartwell">
            <img src="assets/products/ferrari_oversized.jpg">
        </a>
    </div>

</div>

<script>
function updateCartCount(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

cart.forEach(item=>{
    total += item.qty;
});

const badge = document.getElementById("cartCount");

badge.innerText = total;

if(total === 0){
    badge.classList.add("hide");
}else{
    badge.classList.remove("hide");
}

}

updateCartCount();
</script>

</body>
</html>
