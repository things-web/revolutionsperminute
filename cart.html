<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart | rev per min.®</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
font-family:Montserrat;
max-width:520px;
margin:auto;
padding:18px;
}

h2{text-align:center;}

.item{
display:flex;
gap:12px;
border-bottom:1px solid #eee;
padding:14px 0;
}

img{
width:70px;
height:70px;
object-fit:contain;
}

.name{font-weight:700;font-size:0.9rem;}
.meta{font-size:0.8rem;color:#666;}

.qty{display:flex;gap:8px;align-items:center;}
button{cursor:pointer;}

.total{text-align:center;font-weight:700;margin-top:16px;}

.checkout{
width:100%;
padding:14px;
background:#111;
color:#fff;
border:none;
margin-top:16px;
font-weight:700;
border-radius:10px;
}

.info-box{
margin:14px 0;
padding:12px;
border:1px solid #eee;
border-radius:10px;
font-size:0.85rem;
line-height:1.5;
color:#444;
}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#111;
color:#fff;
padding:10px 14px;
border-radius:8px;
opacity:0;
transition:0.3s;
}
.toast.show{opacity:1;}
</style>
</head>

<body>

<h2>Your Cart</h2>

<div id="cart"></div>

<div class="info-box">
1. Tap checkout<br>
2. Order auto-copied<br>
3. Open Instagram<br>
4. Paste & send
</div>

<div class="total" id="total"></div>

<button class="checkout" onclick="checkout()">Proceed to Instagram</button>

<div class="toast" id="toast"></div>

<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[];

function render(){

let box=document.getElementById("cart");
box.innerHTML="";

let total=0;

cart.forEach((i,idx)=>{

total+=i.price*i.qty;

box.innerHTML+=`
<div class="item">
<img src="${i.img}">
<div>
<div class="name">${i.name}</div>
<div class="meta">Size: ${i.size}</div>

<div class="qty">
<button onclick="change(${idx},-1)">-</button>
${i.qty}
<button onclick="change(${idx},1)">+</button>
</div>

<div>₹${i.price*i.qty}</div>
</div>
</div>`;
});

document.getElementById("total").innerText="Total: ₹"+total;
}

function change(i,v){
cart[i].qty+=v;
if(cart[i].qty<=0) cart.splice(i,1);
save();
}

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
render();
}

/* checkout */
function checkout(){

let msg="🛒 ORDER - rev per min.%0A%0A";
let total=0;

cart.forEach(i=>{
total+=i.price*i.qty;
msg+=`${i.name}%0ASize: ${i.size}%0AQty: ${i.qty}%0A%0A`;
});

msg+=`TOTAL: ₹${total}`;

navigator.clipboard.writeText(decodeURIComponent(msg));

window.open("https://ig.me/m/revolutions.perminute","_blank");

toast("Order copied");
}

function toast(m){
let t=document.getElementById("toast");
t.innerText=m;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

render();

</script>

</body>
</html>
