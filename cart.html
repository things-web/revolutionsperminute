<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart | rev per min.®</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:#fff;
color:#111;
padding:18px;
max-width:520px;
margin:auto;
}

h2{
text-align:center;
font-size:1.2rem;
margin-bottom:18px;
}

.item{
display:flex;
gap:14px;
padding:16px 0;
border-bottom:1px solid #eee;
align-items:flex-start;
}

.item img{
width:76px;
height:76px;
object-fit:contain;
background:#fff;
border-radius:10px;
flex-shrink:0;
}

.info{
flex:1;
min-width:0;
}

.name{
font-size:0.9rem;
font-weight:700;
line-height:1.4;
margin-bottom:4px;
}

.meta{
font-size:0.8rem;
color:#666;
margin-bottom:10px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
}

.qty{
display:flex;
align-items:center;
gap:8px;
}

.qty button{
width:28px;
height:28px;
border:1px solid #ddd;
background:#fff;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.qty span{
font-size:0.9rem;
font-weight:700;
min-width:18px;
text-align:center;
}

.price{
font-size:0.92rem;
font-weight:700;
}

.remove{
margin-top:8px;
font-size:0.76rem;
color:#777;
cursor:pointer;
}

.note{
margin-top:18px;
font-size:0.78rem;
color:#666;
text-align:center;
line-height:1.5;
}

.total{
text-align:center;
margin-top:16px;
font-size:1.08rem;
font-weight:700;
}

.checkout{
width:100%;
padding:14px;
margin-top:16px;
border:1px solid #111;
background:#111;
color:#fff;
font-size:0.95rem;
font-weight:700;
border-radius:8px;
cursor:pointer;
}

.empty{
text-align:center;
margin-top:40px;
color:#666;
}
</style>
</head>

<body>

<h2>Your Cart</h2>

<div id="cart"></div>

<div class="note" id="note">
Final payable amount may vary slightly based on delivery location.
</div>

<div class="total" id="total"></div>

<button class="checkout" id="checkoutBtn" onclick="checkout()">
Proceed to Checkout on WhatsApp
</button>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* SAFETY: prevent undefined sizes */
cart = cart.map(item => ({
...item,
fit: item.fit || "Standard"
}));

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

function renderCart(){

let box = document.getElementById("cart");
let totalBox = document.getElementById("total");
let note = document.getElementById("note");
let btn = document.getElementById("checkoutBtn");

box.innerHTML = "";

if(cart.length===0){
box.innerHTML = "<div class='empty'>Your cart is empty</div>";
totalBox.innerHTML = "";
note.style.display = "none";
btn.style.display = "none";
return;
}

note.style.display = "block";
btn.style.display = "block";

let total = 0;

cart.forEach((item,index)=>{

let subtotal = item.price * item.qty;
total += subtotal;

box.innerHTML += `
<div class="item">

<img src="${item.img || 'assets/products/ferrari-front.jpg'}">

<div class="info">

<div class="name">${item.name}</div>

<div class="meta">Size: ${item.fit}</div>

<div class="row">

<div class="qty">
<button onclick="changeQty(${index},-1)">−</button>
<span>${item.qty}</span>
<button onclick="changeQty(${index},1)">+</button>
</div>

<div class="price">₹${subtotal}</div>

</div>

<div class="remove" onclick="removeItem(${index})">Remove</div>

</div>

</div>
`;
});

totalBox.innerText = "Total: ₹" + total;
}

function changeQty(index,val){
cart[index].qty += val;

if(cart[index].qty<=0){
cart.splice(index,1);
}

saveCart();
}

function removeItem(index){
cart.splice(index,1);
saveCart();
}

/* ✅ CLEAN WHATSAPP CHECKOUT FIX */
function checkout(){

let total = 0;

let msg = "Hello, I would like to place an order:\n\n";

cart.forEach(item=>{

let subtotal = item.price * item.qty;
total += subtotal;

msg += `• ${item.name}\nSize: ${item.fit}\nQty: ${item.qty}\nAmount: ₹${subtotal}\n\n`;

});

msg += `Total: ₹${total}`;

window.open(
"https://wa.me/919961365304?text=" + encodeURIComponent(msg),
"_blank"
);
}

renderCart();

</script>

</body>
</html>
