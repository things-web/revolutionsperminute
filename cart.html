<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart | rev per min.®</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:#fff;
color:#111;
padding:20px;
}

h2{
text-align:center;
font-size:1.25rem;
margin-bottom:20px;
}

/* CART ITEM */
.item{
display:flex;
gap:14px;
padding:14px 0;
border-bottom:1px solid #eee;
align-items:center;
}

.item img{
width:72px;
height:72px;
object-fit:contain;
border-radius:10px;
background:#fff;
flex-shrink:0;
}

.info{
flex:1;
}

.name{
font-size:0.92rem;
font-weight:700;
line-height:1.4;
margin-bottom:4px;
}

.meta{
font-size:0.82rem;
color:#666;
line-height:1.5;
}

/* NOTE */
.note{
margin-top:18px;
font-size:0.78rem;
color:#666;
text-align:center;
line-height:1.5;
padding:0 8px;
}

/* TOTAL */
.total{
text-align:center;
margin-top:18px;
font-size:1.1rem;
font-weight:700;
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:18px;
border:1px solid #111;
background:#fff;
color:#111;
font-size:0.95rem;
font-weight:700;
border-radius:8px;
cursor:pointer;
}

/* EMPTY */
.empty{
text-align:center;
color:#666;
margin-top:40px;
font-size:0.95rem;
}
</style>
</head>

<body>

<h2>Your Cart</h2>

<div id="cart"></div>

<div class="note">
Final payable amount may vary slightly based on delivery location.
</div>

<div class="total" id="total"></div>

<button onclick="checkout()">Proceed to WhatsApp</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let container = document.getElementById("cart");
let total = 0;

if(cart.length === 0){
container.innerHTML = "<div class='empty'>Your cart is empty</div>";
document.querySelector(".note").style.display = "none";
document.getElementById("total").style.display = "none";
document.querySelector("button").style.display = "none";
}

cart.forEach(item => {

total += item.price * item.qty;

let image = item.img ? item.img : "assets/products/ferrari-front.jpg";

container.innerHTML += `
<div class="item">

<img src="${image}" alt="product">

<div class="info">
<div class="name">${item.name}</div>
<div class="meta">Fit: ${item.fit}</div>
<div class="meta">Qty: ${item.qty}</div>
<div class="meta">₹${item.price}</div>
</div>

</div>
`;
});

document.getElementById("total").innerText = "Total: ₹" + total;

function checkout(){

let phone = "919961365304";

let message = "Hello, I would like to place an order:%0A%0A";

cart.forEach(item => {
message += `• ${item.name}%0AFit: ${item.fit}%0AQty: ${item.qty}%0APrice: ₹${item.price}%0A%0A`;
});

message += `Total: ₹${total}`;

window.open(`https://wa.me/${phone}?text=${message}`,"_blank");
}
</script>

</body>
</html>
