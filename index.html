<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rev per min.</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#fff;
    font-family:'Montserrat',sans-serif;
    overflow-x:hidden;
}

/* HEADER */
header{
    position:relative;
    width:100%;
    padding:18px;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* BRAND */
.brand{
    font-size:1.5rem;
    font-weight:700;
    text-transform:lowercase;
    letter-spacing:1px;
}

/* MENU */
.menu-btn{
    position:absolute;
    left:18px;
    top:18px;
    width:30px;
    height:22px;
    cursor:pointer;
    z-index:1001;
}

.menu-btn span{
    position:absolute;
    width:100%;
    height:3px;
    background:#000;
    transition:0.3s ease;
    left:0;
}

.menu-btn span:nth-child(1){ top:6px; }
.menu-btn span:nth-child(2){ top:14px; }

.menu-btn.active span:nth-child(1){
    transform:rotate(45deg);
    top:10px;
}

.menu-btn.active span:nth-child(2){
    transform:rotate(-45deg);
    top:10px;
}

.menu-btn.active span{
    background:#fff;
}

/* PREMIUM CART */
.cart-wrap{
    position:absolute;
    right:18px;
    top:18px;
    text-decoration:none;
    color:#000;
    font-size:22px;
}

.cart-count{
    position:absolute;
    top:-7px;
    right:-10px;
    background:#000;
    color:#fff;
    font-size:10px;
    min-width:18px;
    height:18px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 4px;
    font-weight:700;
}

.cart-count.hide{
    display:none;
}

/* SIDE MENU */
.side-menu{
    position:fixed;
    top:0;
    left:-260px;
    width:240px;
    height:100vh;
    background:#0b1b3a;
    padding:80px 20px;
    transition:0.3s;
    z-index:1000;
}

.side-menu a{
    display:block;
    color:#fff;
    text-decoration:none;
    font-size:1.2rem;
    margin-bottom:20px;
}

.side-menu.active{
    left:0;
}

/* MAIN */
.main{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
    margin-top:20px;
}

/* TOP BOX */
.square{
    width:88vw;
    max-width:340px;
    height:170px;
    background:#000;
    border-radius:16px;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

.collections{
    color:#fff;
    font-family:'Bebas Neue',sans-serif;
    font-size:3.4rem;
    text-decoration:none;
}

/* SLIDER */
.slider-track{
    width:300%;
    height:100%;
    display:flex;
    animation:slide 9s infinite;
    cursor:pointer;
}

.slider-track img{
    width:100%;
    height:100%;
    flex-shrink:0;
    object-fit:cover;
}

@keyframes slide{
    0%{transform:translateX(0%);}
    30%{transform:translateX(0%);}

    35%{transform:translateX(-100%);}
    65%{transform:translateX(-100%);}

    70%{transform:translateX(-200%);}
    95%{transform:translateX(-200%);}

    100%{transform:translateX(0%);}
}

/* PRODUCT SECTION */
.product-section{
    margin-top:30px;
    display:flex;
    justify-content:center;
}

.product-card{
    width:88vw;
    max-width:340px;
    background:#f4f4f4;
    padding:15px;
    border-radius:16px;
    text-align:center;
}

.product-images{
    display:flex;
    gap:10px;
}

.product-images img{
    width:50%;
    height:160px;
    object-fit:cover;
    border-radius:12px;
    background:#fff;
}

.product-card h2{
    margin-top:12px;
    font-size:1.1rem;
    font-weight:700;
}

.product-card p{
    font-size:0.85rem;
    color:#666;
    margin-top:5px;
    line-height:1.3;
}

.price{
    margin-top:10px;
    font-weight:700;
}

/* RESPONSIVE */
@media(min-width:768px){
    .brand{font-size:2rem;}
    .square{width:360px;height:190px;}
    .collections{font-size:4rem;}
}
</style>
</head>

<body>

<header>

    <div class="menu-btn" onclick="toggleMenu()">
        <span></span>
        <span></span>
    </div>

    <div class="brand">rev per min.</div>

    <a href="cart.html" class="cart-wrap">
        🛒
        <span class="cart-count hide" id="cartCount">0</span>
    </a>

</header>

<div class="side-menu" id="menu">
    <a href="index.html">Home</a>
    <a href="collections.html">Collections</a>
</div>

<div class="main">

    <div class="square">
        <a href="collections.html" class="collections">collections</a>
    </div>

    <div class="square">
        <div class="slider-track" id="sliderTrack">
            <img src="img1.jpg">
            <img src="img2.jpg">
            <img src="img3.jpg">
        </div>
    </div>

</div>

<!-- PRODUCT SECTION -->
<div class="product-section">

    <div class="product-card">

        <div class="product-images">
            <img src="assets/products/product1.jpg">
            <img src="assets/products/product2.jpg">
        </div>

        <h2>F1 Jersey Combo</h2>
        <p>Premium motorsport inspired collection</p>
        <div class="price">₹2,499</div>

    </div>

</div>

<script>
function toggleMenu(){
    document.querySelector(".menu-btn").classList.toggle("active");
    document.getElementById("menu").classList.toggle("active");
}

/* CLICK TO CHANGE SLIDE */
let slider = document.getElementById("sliderTrack");
let current = 0;
const totalSlides = 3;

slider.addEventListener("click", () => {
    current = (current + 1) % totalSlides;
    slider.style.transform = `translateX(-${current * 100}%)`;
});

/* CART COUNT */
function updateCartCount(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

cart.forEach(item=>{
    total += item.qty;
});

const badge = document.getElementById("cartCount");

badge.innerText = total;

if(total === 0){
    badge.classList.add("hide");
}else{
    badge.classList.remove("hide");
}

}

updateCartCount();
</script>

</body>
</html>
