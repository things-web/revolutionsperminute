<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rev per min.</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#fff;
    font-family:'Montserrat',sans-serif;
    overflow-x:hidden;
}

/* HEADER */
header{
    position:relative;
    width:100%;
    padding:18px;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* BRAND */
.brand{
    font-size:1.5rem;
    font-weight:700;
    text-transform:lowercase;
    letter-spacing:1px;
}

/* ===== 2-LINE MENU BUTTON ===== */
.menu-btn{
    position:absolute;
    left:18px;
    top:18px;
    width:30px;
    height:22px;
    cursor:pointer;
    z-index:1001;
}

.menu-btn span{
    position:absolute;
    width:100%;
    height:3px;
    background:#000;
    transition:0.3s ease;
    left:0;
}

/* two lines */
.menu-btn span:nth-child(1){
    top:6px;
}

.menu-btn span:nth-child(2){
    top:14px;
}

/* X animation */
.menu-btn.active span:nth-child(1){
    transform:rotate(45deg);
    top:10px;
}

.menu-btn.active span:nth-child(2){
    transform:rotate(-45deg);
    top:10px;
}

/* CART */
.cart{
    position:absolute;
    right:18px;
    top:18px;
    font-size:22px;
    text-decoration:none;
    color:#000;
}

/* SIDE MENU */
.side-menu{
    position:fixed;
    top:0;
    left:-260px;
    width:240px;
    height:100vh;
    background:#000;
    padding:80px 20px;
    transition:0.3s;
    z-index:1000;
}

.side-menu a{
    display:block;
    color:#fff;
    text-decoration:none;
    font-size:1.2rem;
    margin-bottom:20px;
    font-weight:500;
}

.side-menu.active{
    left:0;
}

/* MAIN */
.main{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
    margin-top:20px;
}

/* BOX */
.square{
    width:88vw;
    max-width:340px;
    height:170px;
    background:#000;
    border-radius:16px;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* COLLECTION */
.collections{
    color:#fff;
    font-family:'Bebas Neue',sans-serif;
    font-size:3.4rem;
    text-decoration:none;
}

/* ===== FIXED SLIDER ===== */
.slider-track{
    width:300%;
    height:100%;
    display:flex;
    animation:slide 9s infinite;
}

.slider-track img{
    width:100%;
    height:100%;
    flex-shrink:0;
    object-fit:cover;
}

/* CLEAN SLIDE */
@keyframes slide{
    0%{transform:translateX(0%);}
    33%{transform:translateX(-33.333%);}
    66%{transform:translateX(-66.666%);}
    100%{transform:translateX(0%);}
}

/* RESPONSIVE */
@media(min-width:768px){
    .brand{font-size:2rem;}
    .square{width:360px;height:190px;}
    .collections{font-size:4rem;}
}
</style>
</head>

<body>

<header>

    <!-- 2 LINE MENU -->
    <div class="menu-btn" onclick="toggleMenu()">
        <span></span>
        <span></span>
    </div>

    <div class="brand">rev per min.</div>

    <!-- CART -->
    <a href="cart.html" class="cart">🛒</a>

</header>

<!-- SIDE MENU -->
<div class="side-menu" id="menu">
    <a href="index.html">Home</a>
    <a href="collections.html">Collections</a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="square">
        <a href="collections.html" class="collections">collections</a>
    </div>

    <div class="square">
        <div class="slider-track">
            <img src="img1.jpg">
            <img src="img2.jpg">
            <img src="img3.jpg">
        </div>
    </div>

</div>

<script>
function toggleMenu(){
    document.querySelector(".menu-btn").classList.toggle("active");
    document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
