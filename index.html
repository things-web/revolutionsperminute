<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rev per min.</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#fff;
    font-family:'Montserrat',sans-serif;
    overflow-x:hidden;
}

/* HEADER */
header{
    position:relative;
    width:100%;
    padding:18px;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* BRAND */
.brand{
    font-size:1.5rem;
    font-weight:700;
    text-transform:lowercase;
    letter-spacing:1px;
}

/* ===== HAMBURGER (2 LINES) ===== */
.menu-btn{
    position:absolute;
    left:18px;
    top:18px;
    width:30px;
    height:22px;
    cursor:pointer;
    z-index:1001;
}

.menu-btn span{
    position:absolute;
    width:100%;
    height:3px;
    background:#000;
    transition:0.3s ease;
    left:0;
}

.menu-btn span:nth-child(1){ top:6px; }
.menu-btn span:nth-child(2){ top:14px; }

.menu-btn.active span:nth-child(1){
    transform:rotate(45deg);
    top:10px;
}

.menu-btn.active span:nth-child(2){
    transform:rotate(-45deg);
    top:10px;
}

.menu-btn.active span{
    background:#fff;
}

/* CART */
.cart{
    position:absolute;
    right:18px;
    top:18px;
    font-size:22px;
    text-decoration:none;
    color:#000;
}

/* SIDE MENU */
.side-menu{
    position:fixed;
    top:0;
    left:-260px;
    width:240px;
    height:100vh;
    background:#0b1b3a;
    padding:80px 20px;
    transition:0.3s;
    z-index:1000;
}

.side-menu a{
    display:block;
    color:#fff;
    text-decoration:none;
    font-size:1.2rem;
    margin-bottom:20px;
    font-weight:500;
}

.side-menu.active{
    left:0;
}

/* MAIN */
.main{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
    margin-top:20px;
}

/* BOXES */
.square{
    width:88vw;
    max-width:340px;
    height:170px;
    background:#000;
    border-radius:16px;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

.collections{
    color:#fff;
    font-family:'Bebas Neue',sans-serif;
    font-size:3.4rem;
    text-decoration:none;
}

/* SLIDER */
.slider-track{
    width:300%;
    height:100%;
    display:flex;
    animation:slide 9s infinite;
}

.slider-track img{
    width:100%;
    height:100%;
    flex-shrink:0;
    object-fit:cover;
}

@keyframes slide{
    0%{transform:translateX(0%);}
    33%{transform:translateX(-33.333%);}
    66%{transform:translateX(-66.666%);}
    100%{transform:translateX(0%);}
}

/* ===== PRODUCT SECTION (ADDED ONLY BELOW) ===== */

.product-section{
    margin-top:30px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.product-slider{
    width:88vw;
    max-width:340px;
    overflow:hidden;
    border-radius:16px;
}

.product-track{
    display:flex;
    width:200%;
    transition:0.5s ease;
}

.product-card{
    width:100%;
    flex-shrink:0;
    background:#f4f4f4;
    padding:15px;
    text-align:center;
}

.product-card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:12px;
}

.product-card h2{
    margin-top:10px;
    font-size:1.2rem;
}

.product-card p{
    font-size:0.9rem;
    color:#555;
}

.price{
    margin-top:8px;
    font-weight:700;
}

.dots{
    margin-top:10px;
}

.dot{
    height:8px;
    width:8px;
    margin:0 4px;
    display:inline-block;
    background:#bbb;
    border-radius:50%;
    cursor:pointer;
}

.dot.active{
    background:#000;
}

/* RESPONSIVE */
@media(min-width:768px){
    .brand{font-size:2rem;}
    .square{width:360px;height:190px;}
    .collections{font-size:4rem;}
}
</style>
</head>

<body>

<header>

    <div class="menu-btn" onclick="toggleMenu()">
        <span></span>
        <span></span>
    </div>

    <div class="brand">rev per min.</div>

    <a href="cart.html" class="cart">🛒</a>

</header>

<div class="side-menu" id="menu">
    <a href="index.html">Home</a>
    <a href="collections.html">Collections</a>
</div>

<div class="main">

    <div class="square">
        <a href="collections.html" class="collections">collections</a>
    </div>

    <div class="square">
        <div class="slider-track">
            <img src="img1.jpg">
            <img src="img2.jpg">
            <img src="img3.jpg">
        </div>
    </div>

</div>

<!-- PRODUCT SECTION (NEW - BELOW EVERYTHING) -->
<div class="product-section">

    <div class="product-slider">

        <div class="product-track" id="productTrack">

            <div class="product-card">
                <img src="assets/products/product1.jpg">
                <h2>Ferrari Race Jersey</h2>
                <p>Premium motorsport inspired wear</p>
                <div class="price">₹1,499</div>
            </div>

            <div class="product-card">
                <img src="assets/products/product2.jpg">
                <h2>Red Bull Street Tee</h2>
                <p>Limited edition racing streetwear</p>
                <div class="price">₹1,299</div>
            </div>

        </div>

    </div>

    <div class="dots">
        <span class="dot active" onclick="slideProduct(0)"></span>
        <span class="dot" onclick="slideProduct(1)"></span>
    </div>

</div>

<script>
function toggleMenu(){
    document.querySelector(".menu-btn").classList.toggle("active");
    document.getElementById("menu").classList.toggle("active");
}

let productTrack = document.getElementById("productTrack");
let productDots = document.querySelectorAll(".dot");

function slideProduct(index){
    productTrack.style.transform = `translateX(-${index * 100}%)`;

    productDots.forEach(d => d.classList.remove("active"));
    productDots[index].classList.add("active");
}
</script>

</body>
</html>
