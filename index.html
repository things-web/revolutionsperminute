<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rev per min.</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ffffff;
    font-family:'Montserrat',sans-serif;
    overflow:hidden;
    height:100vh;
    width:100%;
    position:relative;
}

/* TOP BRAND */
.brand{
    text-align:center;
    font-size:1.5rem;
    font-weight:700;
    color:#000;
    margin-top:18px;
    text-transform:lowercase;
    letter-spacing:1px;
}

/* MAIN AREA */
.main{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
    margin-top:28px;
}

/* IDENTICAL SQUARES */
.square{
    width:88vw;
    max-width:340px;
    height:170px;
    background:#000;
    border-radius:16px;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* COLLECTION BUTTON */
.collections{
    color:#fff;
    font-size:1.2rem;
    font-weight:700;
    text-transform:lowercase;
    letter-spacing:1px;
    text-decoration:none;
}

/* SLIDESHOW */
.slider-track{
    width:300%;
    height:100%;
    display:flex;
    animation:slide 12s infinite;
}

.slider-track img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* CAR */
.car{
    position:absolute;
    bottom:5%;
    left:-45%;
    width:290px;
    z-index:2;
    animation:run 0.75s linear forwards;
    animation-delay:0.5s;
}

/* CAR RUN */
@keyframes run{
    0%{
        left:-45%;
        opacity:1;
    }
    100%{
        left:120%;
        opacity:0;
    }
}

/* SLIDER */
@keyframes slide{
    0%,30%{
        transform:translateX(0%);
    }
    33%,63%{
        transform:translateX(-33.333%);
    }
    66%,96%{
        transform:translateX(-66.666%);
    }
    100%{
        transform:translateX(0%);
    }
}

/* TABLET+ */
@media(min-width:768px){

.brand{
    font-size:2rem;
    margin-top:25px;
}

.square{
    width:360px;
    height:190px;
}

.car{
    width:420px;
}

}
</style>
</head>

<body>

<div class="brand">rev per min.</div>

<div class="main">

    <div class="square">
        <a href="#" class="collections">collections</a>
    </div>

    <div class="square">
        <div class="slider-track">
            <img src="img1.jpg" alt="slide1">
            <img src="img2.jpg" alt="slide2">
            <img src="img3.jpg" alt="slide3">
        </div>
    </div>

</div>

<img src="car.png" class="car" alt="car">

</body>
</html>
