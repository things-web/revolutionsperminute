<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rev per min.</title>

<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@700;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1220;
    overflow:hidden;
    height:100vh;
    width:100%;
    font-family:'Titillium Web',sans-serif;
    position:relative;
}

/* MOBILE FIRST BRAND TEXT */
.brand{
    position:absolute;
    top:8%;
    left:50%;
    transform:translateX(-50%);
    font-size:1.7rem;
    font-weight:700;
    color:#ff2a2a;
    letter-spacing:1px;
    text-transform:lowercase;
    text-align:center;
    width:92%;
    z-index:5;
}

/* CAR */
.car{
    position:absolute;
    bottom:8%;
    left:-45%;
    width:320px;
    z-index:4;
    animation:run 0.75s linear forwards;
    animation-delay:0.5s;
}

/* CAR MOVEMENT */
@keyframes run{
    0%{
        left:-45%;
        opacity:1;
    }
    100%{
        left:120%;
        opacity:0;
    }
}

/* TABLET / DESKTOP */
@media(min-width:768px){

.brand{
    top:7%;
    font-size:2.2rem;
    width:100%;
}

.car{
    width:430px;
    bottom:8%;
}

}
</style>
</head>

<body>

<div class="brand">rev per min.</div>

<img src="car.png" class="car" alt="race car">

</body>
</html>
