<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revolutions Per Minute</title>

<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@700;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ffffff;
    overflow:hidden;
    height:100vh;
    width:100%;
    font-family:'Titillium Web',sans-serif;
    position:relative;
}

/* BRAND NAME - MOBILE FIRST */
.brand{
    position:absolute;
    top:8%;
    left:50%;
    transform:translateX(-50%);
    font-size:2.3rem;
    font-weight:900;
    color:#d10000;
    letter-spacing:1px;
    text-transform:uppercase;
    text-align:center;
    width:92%;
    line-height:1.05;
    z-index:5;
}

/* CAR */
.car{
    position:absolute;
    bottom:8%;
    left:-45%;
    width:320px;
    z-index:4;
    animation:run 0.75s linear forwards;
    animation-delay:0.5s;
}

/* SMOKE */
.smoke{
    position:absolute;
    bottom:9%;
    left:-35%;
    width:180px;
    height:70px;
    border-radius:50%;
    background:rgba(170,170,170,0.30);
    filter:blur(22px);
    animation:smoke 1s linear forwards;
    animation-delay:0.5s;
    z-index:1;
}

/* ANIMATIONS */
@keyframes run{
    0%{
        left:-45%;
        opacity:1;
    }
    100%{
        left:120%;
        opacity:0;
    }
}

@keyframes smoke{
    0%{
        left:-35%;
        opacity:0;
    }
    20%{
        opacity:1;
    }
    100%{
        left:95%;
        opacity:0;
    }
}

/* DESKTOP / TABLET */
@media(min-width:768px){
.brand{
    top:7%;
    font-size:3rem;
    width:100%;
}

.car{
    width:430px;
    bottom:8%;
}

.smoke{
    width:240px;
    height:85px;
}
}
</style>
</head>

<body>

<div class="brand">Revolutions Per Minute</div>

<img src="car.png" class="car">
<div class="smoke"></div>

</body>
</html>
