<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product | rev per min.®</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:#fff;color:#111;}

header{
position:relative;
padding:18px;
display:flex;
justify-content:center;
align-items:center;
border-bottom:1px solid #eee;
min-height:74px;
}

.back{
position:absolute;
left:18px;
top:24px;
text-decoration:none;
color:#111;
font-size:18px;
font-weight:700;
}

.logo{width:160px;max-width:58vw;}

.cart-wrap{
position:absolute;
right:18px;
top:22px;
font-size:22px;
color:#111;
text-decoration:none;
}

.cart-count{
position:absolute;
top:-6px;
right:-10px;
background:#000;
color:#fff;
font-size:10px;
min-width:18px;
height:18px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
}

.cart-count.hide{display:none;}

.container{
max-width:420px;
margin:auto;
padding:22px;
}

/* 🔥 GALLERY */
.gallery{
position:relative;
overflow:hidden;
border-radius:16px;
}

.slides{
display:flex;
transition:0.4s ease;
}

.slides img{
width:100%;
flex-shrink:0;
height:340px;
object-fit:contain;
}

/* ARROWS */
.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
width:34px;
height:34px;
background:rgba(0,0,0,0.45);
color:#fff;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-size:20px;
cursor:pointer;
z-index:10;
backdrop-filter:blur(4px);
}

.arrow.left{left:10px;}
.arrow.right{right:10px;}

.arrow:active{
transform:translateY(-50%) scale(0.9);
}

/* DOTS */
.dots{
display:flex;
justify-content:center;
gap:8px;
margin-top:12px;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:#ccc;
cursor:pointer;
}

.dot.active{background:#111;}

h1{
font-size:1.05rem;
margin-top:18px;
text-align:center;
}

.price{
font-size:1.35rem;
font-weight:700;
margin-top:10px;
text-align:center;
}

.desc{
font-size:0.9rem;
color:#666;
margin-top:12px;
text-align:center;
}

.label{
margin-top:24px;
font-size:0.9rem;
font-weight:700;
}

.fit-options{
display:flex;
gap:10px;
margin-top:10px;
}

.fit-btn{
flex:1;
padding:14px;
border:1px solid #ddd;
background:#fff;
border-radius:12px;
cursor:pointer;
font-weight:700;
text-align:center;
}

.fit-btn.active{
background:#111;
color:#fff;
border-color:#111;
}

.fit-btn.disabled{
opacity:0.35;
pointer-events:none;
}

.fit-desc{
font-size:0.82rem;
color:#666;
margin-top:10px;
}

.cart-btn{
width:100%;
padding:15px;
margin-top:20px;
border:none;
background:#111;
color:#fff;
font-size:1rem;
border-radius:12px;
cursor:pointer;
font-weight:700;
}

.cart-btn.added{
background:#fff;
color:#111;
border:1px solid #111;
}
</style>
</head>

<body>

<header>
<a href="collections.html" class="back">←</a>
<img src="assets/logo.png" class="logo">
<a href="cart.html" class="cart-wrap">
🛒
<span class="cart-count hide" id="cartCount">0</span>
</a>
</header>

<div class="container">

<div class="gallery">

<div class="arrow left" onclick="prevSlide()">‹</div>

<div class="slides" id="slides"></div>

<div class="arrow right" onclick="nextSlide()">›</div>

</div>

<div class="dots" id="dots"></div>

<h1 id="name"></h1>
<div class="price" id="price"></div>
<div class="desc" id="desc"></div>

<div class="label" id="fitLabel">Choose Fit</div>

<div class="fit-options" id="fitWrap">
<button class="fit-btn disabled">S</button>
<button class="fit-btn disabled">M</button>
<button class="fit-btn" onclick="pickFit(this,'L')">L</button>
<button class="fit-btn" onclick="pickFit(this,'XL')">XL</button>
</div>

<div class="fit-desc" id="fitDesc">
We recommend choosing one size up from your usual fit.
</div>

<button class="cart-btn" id="cartBtn" onclick="addToCart()">Add to Cart</button>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id") || "polo";

const products = {
polo:{
name:"Ferrari 2025 Drivers Sublimation Wear",
price:469,
desc:"Race inspired jersey built for everyday wear.",
images:[
"assets/products/ferrari-front.jpg",
"assets/products/ferrari-back.jpg"
],
live:true
}
};

const product = products[id];

document.getElementById("name").innerText = product.name;
document.getElementById("price").innerText = "₹"+product.price;
document.getElementById("desc").innerText = product.desc;

/* SLIDER */
const slides = document.getElementById("slides");
const dots = document.getElementById("dots");

product.images.forEach((img,i)=>{
slides.innerHTML += `<img src="${img}">`;
dots.innerHTML += `<div class="dot ${i===0?'active':''}" onclick="goSlide(${i})"></div>`;
});

let current = 0;

function goSlide(i){
current = i;
slides.style.transform = `translateX(-${i*100}%)`;

document.querySelectorAll(".dot").forEach((d,index)=>{
d.classList.toggle("active",index===i);
});
}

function nextSlide(){
if(current < product.images.length-1){
goSlide(current+1);
}
}

function prevSlide(){
if(current > 0){
goSlide(current-1);
}
}

/* SWIPE */
let startX = 0;

slides.addEventListener("touchstart",e=>{
startX = e.touches[0].clientX;
});

slides.addEventListener("touchend",e=>{
let endX = e.changedTouches[0].clientX;

if(endX < startX - 40) nextSlide();
if(endX > startX + 40) prevSlide();
});

/* CART COUNT */
function updateCartCount(){
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;
cart.forEach(i=>total+=i.qty);

let badge = document.getElementById("cartCount");
badge.innerText = total;
badge.classList.toggle("hide", total===0);
}
updateCartCount();

</script>

</body>
</html>
