<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product | rev per min.®</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:#fff;color:#111;}

/* HEADER */
header{
position:relative;
padding:18px;
display:flex;
justify-content:center;
align-items:center;
border-bottom:1px solid #eee;
min-height:74px;
}

.back{
position:absolute;
left:18px;
top:24px;
text-decoration:none;
color:#111;
font-size:18px;
font-weight:700;
}

.logo{
width:160px;
max-width:58vw;
}

.cart-wrap{
position:absolute;
right:18px;
top:22px;
text-decoration:none;
font-size:22px;
color:#111;
}

.cart-count{
position:absolute;
top:-6px;
right:-10px;
background:#000;
color:#fff;
font-size:10px;
min-width:18px;
height:18px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
}

.cart-count.hide{display:none;}

/* CONTAINER */
.container{
max-width:420px;
margin:auto;
padding:18px;
}

/* SLIDER */
.gallery{
overflow:hidden;
border-radius:16px;
}

.slides{
display:flex;
transition: transform 0.65s cubic-bezier(0.22, 1, 0.36, 1);
}

.slides img{
width:100%;
flex-shrink:0;
height:440px;
object-fit:cover;
border-radius:16px;
}

/* DOTS */
.dots{
display:flex;
justify-content:center;
gap:8px;
margin-top:10px;
}

.dot{
width:7px;
height:7px;
border-radius:50%;
background:#ccc;
cursor:pointer;
}

.dot.active{
background:#111;
transform:scale(1.2);
}

/* TEXT */
h1{text-align:center;font-size:1.05rem;margin-top:18px;}
.price{text-align:center;font-size:1.35rem;font-weight:700;margin-top:10px;}
.desc{text-align:center;font-size:0.9rem;color:#666;margin-top:12px;line-height:1.6;}

/* SIZE */
.label{
margin-top:24px;
font-size:0.9rem;
font-weight:700;
}

.size-grid{
display:flex;
gap:10px;
margin-top:12px;
}

.size-box{
flex:1;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
text-align:center;
font-weight:700;
cursor:pointer;
}

.size-box.active{
background:#111;
color:#fff;
border-color:#111;
}

.size-box.disabled{
opacity:0.4;
pointer-events:none;
}

/* NOTE */
.fit-note{
font-size:0.8rem;
color:#666;
margin-top:12px;
}

/* BUTTONS */
.cart-btn{
width:100%;
padding:15px;
margin-top:20px;
border:none;
background:#111;
color:#fff;
font-size:1rem;
border-radius:12px;
cursor:pointer;
font-weight:700;
}

.cart-btn.added{
background:#fff;
color:#111;
border:1px solid #111;
}

.enquiry-btn{
background:#111;
color:#fff;
border:1px solid #111;
margin-top:10px;
}

/* MOBILE */
@media(max-width:480px){
.slides img{height:480px;}
.container{padding:14px;}
}
</style>
</head>

<body>

<header>
<a href="collections.html" class="back">←</a>
<img src="assets/logo.png" class="logo">

<a href="cart.html" class="cart-wrap">
🛒<span class="cart-count hide" id="cartCount">0</span>
</a>
</header>

<div class="container">

<!-- SLIDER -->
<div class="gallery">
<div class="slides" id="slides"></div>
</div>

<div class="dots" id="dots"></div>

<h1 id="name"></h1>
<div class="price" id="price"></div>
<div class="desc" id="desc"></div>

<!-- SIZE -->
<div class="label">Select Size</div>

<div class="size-grid">
<div class="size-box disabled">S</div>
<div class="size-box disabled">M</div>
<div class="size-box" onclick="selectSize(this,'L')">L</div>
<div class="size-box" onclick="selectSize(this,'XL')">XL</div>
</div>

<div class="fit-note">
⚠️ This product runs slightly larger than standard sizing.
</div>

<button class="cart-btn" id="cartBtn" onclick="addToCart()">Add to Cart</button>

<!-- ENQUIRY BUTTON -->
<button class="cart-btn enquiry-btn" id="enquiryBtn">Send Enquiry</button>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id") || "polo";

const products = {
polo:{
id:"ferrari_2025_jersey",
name:"Ferrari 2025 Drivers Sublimation Wear",
price:469,
desc:"Race inspired jersey built for everyday wear.",
images:[
"assets/products/ferrari-front.jpg",
"assets/products/ferrari-back.jpg"
],
live:true
}
};

const product = products[id];

/* TEXT */
document.getElementById("name").innerText = product.name;
document.getElementById("price").innerText = "₹"+product.price;
document.getElementById("desc").innerText = product.desc;

/* SLIDER */
const slides = document.getElementById("slides");
const dots = document.getElementById("dots");

product.images.forEach((img,i)=>{
slides.innerHTML += `<img src="${img}">`;
dots.innerHTML += `<div class="dot ${i===0?'active':''}" onclick="goSlide(${i})"></div>`;
});

let current=0;

function goSlide(i){

current=i;

if(current>=product.images.length) current=0;
if(current<0) current=product.images.length-1;

slides.style.transform=`translateX(-${current*100}%)`;

document.querySelectorAll(".dot").forEach((d,idx)=>{
d.classList.toggle("active",idx===current);
});
}

/* SWIPE */
let startX=0;

slides.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

slides.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;

if(endX<startX-40) goSlide(current+1);
if(endX>startX+40) goSlide(current-1);
});

/* SIZE */
let selectedSize="";

function selectSize(el,size){

document.querySelectorAll(".size-box").forEach(b=>{
b.classList.remove("active");
});

el.classList.add("active");
selectedSize=size;

let btn=document.getElementById("cartBtn");
btn.innerText="Add to Cart";
btn.classList.remove("added");
}

/* CART */
function addToCart(){

if(selectedSize===""){
alert("Please select a size");
return;
}

let cart=JSON.parse(localStorage.getItem("cart"))||[];

let existing=cart.find(item=>
item.id===product.id && item.size===selectedSize
);

if(existing){
existing.qty+=1;
}else{
cart.push({
id:product.id,
name:product.name,
price:product.price,
size:selectedSize,
qty:1,
img:product.images[0]
});
}

localStorage.setItem("cart",JSON.stringify(cart));

let btn=document.getElementById("cartBtn");
btn.innerText="Added to Cart";
btn.classList.add("added");

updateCart();
}

/* ENQUIRY - INSTAGRAM */
document.getElementById("enquiryBtn").onclick=function(){

let msg=`🛒 PRODUCT ENQUIRY - rev per min.%0A%0A`;
msg+=`Product: ${product.name}%0A`;

if(product.price){
msg+=`Price: ₹${product.price}%0A`;
}

msg+=`%0AInterested in availability & details.`;

/* COPY */
navigator.clipboard.writeText(decodeURIComponent(msg));

/* OPEN IG */
window.open("https://ig.me/m/revolutions.perminute","_blank");

alert("Enquiry copied! Paste it in Instagram chat.");
};

/* CART COUNT */
function updateCart(){

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let total=0;

cart.forEach(i=>total+=i.qty);

let badge=document.getElementById("cartCount");

badge.innerText=total;

if(total===0) badge.classList.add("hide");
else badge.classList.remove("hide");
}

updateCart();

</script>

</body>
</html>
