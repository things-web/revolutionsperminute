<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:#fff;
color:#111;
}

header{
padding:18px;
text-align:center;
font-weight:700;
font-size:1.1rem;
border-bottom:1px solid #eee;
position:relative;
}

.back{
position:absolute;
left:18px;
top:18px;
text-decoration:none;
color:#111;
font-size:14px;
}

.container{
max-width:420px;
margin:auto;
padding:22px;
text-align:center;
}

.product-image{
width:100%;
height:340px;
object-fit:contain;
}

h1{
font-size:1.2rem;
margin-top:18px;
line-height:1.4;
}

.price{
font-size:1.5rem;
font-weight:700;
margin-top:12px;
}

.desc{
font-size:0.92rem;
color:#666;
line-height:1.6;
margin-top:12px;
}

.label{
margin-top:24px;
font-size:0.9rem;
font-weight:700;
text-align:left;
}

.fit-options{
display:flex;
gap:10px;
margin-top:12px;
}

.fit-btn{
flex:1;
padding:12px;
border:1px solid #ddd;
background:#fff;
border-radius:10px;
cursor:pointer;
font-size:0.92rem;
}

.fit-btn.active{
background:#000;
color:#fff;
border:1px solid #000;
}

.fit-desc{
margin-top:12px;
font-size:0.88rem;
color:#666;
text-align:left;
line-height:1.5;
min-height:42px;
}

.cart-btn{
width:100%;
padding:15px;
margin-top:24px;
border:1px solid #000;
background:#000;
color:#fff;
font-size:1rem;
border-radius:12px;
cursor:pointer;
transition:0.25s ease;
}

.cart-btn.added{
background:#fff;
color:#000;
}
</style>
</head>

<body>

<header>
<a href="collections.html" class="back">← Back</a>
rev per min.
</header>

<div class="container">

<img id="productImage" class="product-image">

<h1 id="productName"></h1>

<div class="price" id="productPrice"></div>

<div class="desc" id="productDesc"></div>

<div class="label">Choose Fit</div>

<div class="fit-options">
<div class="fit-btn" onclick="pickFit(this,'Normal Fit')">Normal Fit</div>
<div class="fit-btn" onclick="pickFit(this,'Oversized Fit')">Oversized Fit</div>
</div>

<div class="fit-desc" id="fitDesc">
Select a fit option above.
</div>

<button class="cart-btn" id="cartBtn" onclick="addToCart()">Add to Cart</button>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const products = {

polo:{
name:"Ferrari 2025 Drivers Polo Jersey",
price:1499,
img:"assets/products/ferrari_polo_2025.jpg",
desc:"Premium Ferrari inspired jersey crafted for everyday comfort and race-day style."
},

monza:{
name:"Ferrari Monza Edition",
price:1599,
img:"assets/products/ferrari-puma-monza-2025-special-edition-t-shirt.jpg",
desc:"Special Monza edition built from iconic Ferrari racing heritage."
},

swartwell:{
name:"Ferrari Swartwell Oversized Drivers Tee",
price:1299,
img:"assets/products/ferrari_oversized.jpg",
desc:"Streetwear motorsport inspired t-shirt for modern casual wear."
}

};

const product = products[id] || products.polo;

document.getElementById("productImage").src = product.img;
document.getElementById("productName").innerText = product.name;
document.getElementById("productPrice").innerText = "₹" + product.price;
document.getElementById("productDesc").innerText = product.desc;

let selectedFit = "";

function pickFit(el,fit){

document.querySelectorAll(".fit-btn").forEach(btn=>{
btn.classList.remove("active");
});

el.classList.add("active");
selectedFit = fit;

if(fit === "Normal Fit"){
document.getElementById("fitDesc").innerText =
"Regular clean everyday fit with a sharper body shape.";
}else{
document.getElementById("fitDesc").innerText =
"Relaxed loose fit with extra comfort and streetwear vibe.";
}

}

function addToCart(){

if(selectedFit === ""){
alert("Please choose a fit");
return;
}

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({
name:product.name,
price:product.price,
fit:selectedFit,
qty:1
});

localStorage.setItem("cart", JSON.stringify(cart));

const btn = document.getElementById("cartBtn");
btn.innerText = "Added";
btn.classList.add("added");

}
</script>

</body>
</html>
