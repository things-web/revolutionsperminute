<!-- FULL UPDATED product.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product | rev per min.®</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:#fff;color:#111;}

header{
position:relative;
padding:18px;
display:flex;
justify-content:center;
align-items:center;
border-bottom:1px solid #eee;
min-height:74px;
}

.back{
position:absolute;
left:18px;
top:24px;
text-decoration:none;
color:#111;
font-size:18px;
font-weight:700;
}

.logo{
width:160px;
max-width:58vw;
}

.cart-wrap{
position:absolute;
right:18px;
top:22px;
text-decoration:none;
font-size:22px;
color:#111;
}

.cart-count{
position:absolute;
top:-6px;
right:-10px;
background:#000;
color:#fff;
font-size:10px;
min-width:18px;
height:18px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
padding:0 4px;
font-weight:700;
}

.cart-count.hide{display:none;}

.container{
max-width:420px;
margin:auto;
padding:22px;
}

.gallery{overflow:hidden;border-radius:16px;}

.slides{
display:flex;
transition:0.35s ease;
}

.slides img{
width:100%;
flex-shrink:0;
height:340px;
object-fit:contain;
}

.dots{
display:flex;
justify-content:center;
gap:8px;
margin-top:12px;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:#ccc;
cursor:pointer;
}

.dot.active{background:#111;}

h1{
font-size:1.05rem;
line-height:1.45;
margin-top:18px;
text-align:center;
}

.price{
font-size:1.35rem;
font-weight:700;
margin-top:10px;
text-align:center;
}

.desc{
font-size:0.9rem;
color:#666;
line-height:1.6;
margin-top:12px;
text-align:center;
}

.label{
margin-top:24px;
font-size:0.9rem;
font-weight:700;
}

/* SIZE */
.fit-options{
display:flex;
gap:10px;
margin-top:10px;
}

.fit-btn{
flex:1;
padding:14px;
border:1px solid #ddd;
background:#fff;
border-radius:12px;
cursor:pointer;
font-weight:700;
text-align:center;
}

.fit-btn.active{
background:#111;
color:#fff;
border-color:#111;
}

.fit-btn.disabled{
opacity:0.35;
pointer-events:none;
cursor:not-allowed;
}

/* SIZE NOTE */
.fit-desc{
font-size:0.82rem;
color:#666;
margin-top:10px;
line-height:1.5;
}

/* BUTTON */
.cart-btn{
width:100%;
padding:15px;
margin-top:20px;
border:none;
background:#111;
color:#fff;
font-size:1rem;
border-radius:12px;
cursor:pointer;
font-weight:700;
transition:0.2s ease;
}

.cart-btn.added{
background:#fff;
color:#111;
border:1px solid #111;
}

.enquiry-btn{
background:#111;
color:#fff;
}

</style>
</head>

<body>

<header>

<a href="collections.html" class="back">←</a>

<img src="assets/logo.png" class="logo">

<a href="cart.html" class="cart-wrap">
🛒
<span class="cart-count hide" id="cartCount">0</span>
</a>

</header>

<div class="container">

<div class="gallery">
<div class="slides" id="slides"></div>
</div>

<div class="dots" id="dots"></div>

<h1 id="name"></h1>
<div class="price" id="price"></div>
<div class="desc" id="desc"></div>

<div class="label" id="fitLabel">Choose Fit</div>

<div class="fit-options" id="fitWrap">

<button class="fit-btn disabled">S</button>
<button class="fit-btn disabled">M</button>

<button class="fit-btn" onclick="pickFit(this,'L')">L</button>
<button class="fit-btn" onclick="pickFit(this,'XL')">XL</button>

</div>

<div class="fit-desc" id="fitDesc">
We recommend choosing one size up from your usual fit.
</div>

<button class="cart-btn" id="cartBtn" onclick="addToCart()">Add to Cart</button>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id") || "polo";

const products = {

polo:{
name:"Ferrari 2025 Drivers Sublimation Wear",
price:469,
desc:"Race inspired jersey built for everyday wear.",
images:[
"assets/products/ferrari-front.jpg",
"assets/products/ferrari-back.jpg"
],
live:true
},

monza:{
name:"Ferrari Monza Edition",
price:0,
desc:"",
images:[
"assets/products/ferrari-puma-monza-2025-special-edition-t-shirt.jpg"
],
live:false
},

swartwell:{
name:"Ferrari Oversized Wear",
price:0,
desc:"",
images:[
"assets/products/ferrari_oversized.jpg"
],
live:false
}

};

const product = products[id];

document.getElementById("name").innerText = product.name;
document.getElementById("price").innerText =
product.live ? "₹"+product.price : "Coming Soon";

document.getElementById("desc").innerText = product.desc;

/* SLIDER */
const slides = document.getElementById("slides");
const dots = document.getElementById("dots");

product.images.forEach((img,i)=>{
slides.innerHTML += `<img src="${img}">`;
dots.innerHTML += `<div class="dot ${i===0?'active':''}" onclick="goSlide(${i})"></div>`;
});

let current = 0;

function goSlide(i){
current = i;
slides.style.transform = `translateX(-${i*100}%)`;

document.querySelectorAll(".dot").forEach((dot,index)=>{
dot.classList.toggle("active",index===i);
});
}

/* SWIPE */
let startX = 0;

slides.addEventListener("touchstart",e=>{
startX = e.touches[0].clientX;
});

slides.addEventListener("touchend",e=>{
let endX = e.changedTouches[0].clientX;

if(endX < startX - 40 && current < product.images.length-1){
goSlide(current+1);
}

if(endX > startX + 40 && current > 0){
goSlide(current-1);
}
});

/* FIT */
let selectedFit = "";

function pickFit(el,fit){

document.querySelectorAll(".fit-btn").forEach(b=>{
b.classList.remove("active");
});

el.classList.add("active");
selectedFit = fit;

/* reset button state */
let btn = document.getElementById("cartBtn");
btn.innerText = "Add to Cart";
btn.classList.remove("added");
}

/* CART FIXED */
function addToCart(){

if(selectedFit===""){
alert("Choose a fit first");
return;
}

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let found = cart.find(i =>
i.name === product.name &&
i.fit === selectedFit
);

if(found){
found.qty++;
}else{
cart.push({
name:product.name,
price:product.price,
fit:selectedFit,
qty:1,
img:product.images[0]
});
}

localStorage.setItem("cart",JSON.stringify(cart));

let btn = document.getElementById("cartBtn");
btn.innerText = "Added";
btn.classList.add("added");

/* IMPORTANT FIX: ensures repeated clicks still give feedback */
setTimeout(()=>{
btn.innerText = "Add to Cart";
btn.classList.remove("added");
},700);

updateCartCount();
}

/* COMING SOON (UNCHANGED) */
if(!product.live){

document.getElementById("fitWrap").style.display="none";
document.getElementById("fitDesc").style.display="none";
document.getElementById("fitLabel").style.display="none";

let btn = document.getElementById("cartBtn");
btn.innerText = "Send Enquiry";
btn.classList.add("enquiry-btn");

btn.onclick = function(){

let msg = `Hello, I'm interested in ${product.name}. Please let me know when it becomes available.`;

window.open(
"https://wa.me/919961365304?text=" + encodeURIComponent(msg),
"_blank"
);

};

}

/* CART COUNT */
function updateCartCount(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

cart.forEach(i=>total+=i.qty);

let badge = document.getElementById("cartCount");
badge.innerText = total;

badge.classList.toggle("hide", total===0);
}

updateCartCount();

</script>

</body>
</html>
